services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: taller
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - taller-net

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    volumes:
      - ./otel-collector/config.yml:/etc/otel/config.yml
    command: ["--config", "/etc/otel/config.yml"]
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      loki:
        condition: service_started
      tempo:
        condition: service_started
    networks:
      - taller-net

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    networks:
      - taller-net

  tempo:
    image: grafana/tempo:latest
    command: ["-config.file=/etc/tempo.yml"]
    volumes:
      - ./tempo.yml:/etc/tempo.yml
    ports:
      - "3200:3200"
    networks:
      - taller-net

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:latest
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:postgres@postgres:5432/taller?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - taller-net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    networks:
      - taller-net

  node-exporter:
    image: prom/node-exporter:latest
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
    networks:
      - taller-net

  mimir:
    image: grafana/mimir:latest
    volumes:
      - ./mimir.yml:/etc/mimir.yml
      - ./mimir-overrides.yaml:/etc/mimir-overrides.yaml
      - mimir-data:/data
    command: ["-config.file=/etc/mimir.yml"]
    ports:
      - "9009:9009"
    networks:
      - taller-net

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - ./grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards/dashboards
    depends_on:
      - loki
      - tempo
      - mimir
    networks:
      - taller-net

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/taller?schema=public
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: taller-backend
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
    command: >
      sh -c "
        npx prisma db push --schema=schema.prisma &&
        node --enable-source-maps packages/infrastructure/dist/index.js
      "
    networks:
      - taller-net

volumes:
  pgdata:
  mimir-data:

networks:
  taller-net:
    driver: bridge
