# Minimal single-node Mimir config
# Based on: https://github.com/grafana/mimir/blob/main/docs/configurations/single-process-config-blocks.yaml
server:
  http_listen_port: 9009

# Runtime overrides for per-tenant limits
runtime_config:
  file: /etc/mimir-overrides.yaml

distributor:
  ring:
    kvstore:
      store: inmemory

ingester:
  ring:
    kvstore:
      store: inmemory
    replication_factor: 1
    num_tokens: 512
    min_ready_duration: 0s
    final_sleep: 0s

blocks_storage:
  backend: filesystem
  filesystem:
    dir: /data/blocks
  tsdb:
    dir: /data/tsdb
  bucket_store:
    sync_dir: /data/tsdb-sync

compactor:
  sharding_ring:
    kvstore:
      store: inmemory

store_gateway:
  sharding_ring:
    kvstore:
      store: inmemory
    replication_factor: 1

# Increase label limit for cAdvisor metrics which have ~31 labels
limits:
  max_label_names_per_series: 50
